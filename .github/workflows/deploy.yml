name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm install

      - name: Build with VitePress
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: IndexNow - Notify search engines
        if: success()
        run: |
          KEY="Lb9E0UHr7c6jRwtmJlQzZa3BqvfPoYeK"
          HOST="johboby.github.io"
          BASE="https://johboby.github.io/lanyuejie-blog"
          URL_LIST="[\"${BASE}/\",\"${BASE}/posts/\",\"${BASE}/about.html\",\"${BASE}/posts/ai-agent-industry-report-2025-2026.html\",\"${BASE}/posts/ai-humanities-integration.html\",\"${BASE}/posts/chenyuan-research-collection.html\",\"${BASE}/posts/economic-policy-ai-econometrics.html\",\"${BASE}/posts/energy-climate-industry-report.html\",\"${BASE}/posts/energy-manufacturing-trends-2026h1.html\",\"${BASE}/posts/global-industry-outlook-2026.html\",\"${BASE}/posts/global-tech-breakthrough-2025-2026.html\",\"${BASE}/posts/global-value-chain-resilience.html\",\"${BASE}/posts/llm-knowledge-automation.html\",\"${BASE}/posts/market-trends-dec-2025.html\",\"${BASE}/posts/market-trends-mar-2026.html\"]"
          BODY="{\"host\":\"${HOST}\",\"key\":\"${KEY}\",\"urlList\":${URL_LIST}}"
          echo "Submitting to IndexNow endpoints..."
          curl -s -o /dev/null -w "IndexNow API: %{http_code}\n" -X POST "https://api.indexnow.org/indexnow" -H "Content-Type: application/json" -d "$BODY" || true
          curl -s -o /dev/null -w "Bing: %{http_code}\n" -X POST "https://www.bing.com/indexnow" -H "Content-Type: application/json" -d "$BODY" || true
          curl -s -o /dev/null -w "Yandex: %{http_code}\n" -X POST "https://yandex.com/indexnow" -H "Content-Type: application/json" -d "$BODY" || true
          curl -s -o /dev/null -w "Seznam: %{http_code}\n" -X POST "https://search.seznam.cz/indexnow" -H "Content-Type: application/json" -d "$BODY" || true
